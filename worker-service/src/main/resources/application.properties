spring.application.name=worker-service
server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3306/webhook_db
spring.datasource.username=root
spring.datasource.password=Skylandjumper@73
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

workflow.service.url=http://localhost:8080
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=worker-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.kinetix.workerservice.dto.ExecutionEvent


spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer